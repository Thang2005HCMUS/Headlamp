apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # Giúp dọn dẹp sạch tài nguyên nếu bạn xóa App này trên ArgoCD
spec:
  project: default
  source:
    chart: headlamp
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    targetRevision: 0.27.0 # Sử dụng phiên bản chart ổn định
    helm:
      releaseName: my-headlamp
      values: |
        # 1. Cấu hình Ingress để tự động hóa việc truy cập (Thay thế port-forward)
        ingress:
          enabled: true
          ingressClassName: nginx # Đổi thành traefik, alb... nếu bạn dùng loại khác
          annotations:
            kubernetes.io/ingress.class: nginx
            # Bật cấu hình nếu bạn muốn dùng SSL/TLS (Bỏ comment nếu cần)
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
          hosts:
            - host: headlamp.local # Đổi thành domain mong muốn của bạn
              paths:
                - path: /
                  pathType: Prefix
          tls: []
            - secretName: headlamp-tls
              hosts:
                - headlamp.local

        # 2. Cấu hình bảo mật và quyền hạn cho Headlamp
        clusterRoleBinding:
          create: true # Tự động tạo ClusterRoleBinding để Headlamp có quyền đọc tài nguyên cluster

        # 3. Các cấu hình bổ sung cho giao diện (Tùy chọn)
        config:
          baseURL: ""
          # Bật tính năng này nếu bạn muốn cho phép người dùng đổi cluster ngay trên UI
          multiCluster: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system # Cài đặt vào namespace hệ thống như bạn mong muốn
  syncPolicy:
    automated:
      prune: true      # Tự động xóa tài nguyên thừa nếu bạn sửa file git
      selfHeal: true   # Tự động sửa chữa nếu ai đó vào sửa tay trong cluster (đảm bảo đúng chuẩn GitOps)
    createNamespace: true # Tự động tạo namespace kube-system nếu chưa có
    syncOptions:
      - CreateNamespace=true