apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd # Nơi ArgoCD quản lý ứng dụng này
spec:
  project: default
  source:
    repoURL: 'https://headlamp-k8s.github.io/headlamp' # URL Helm chart chính thức của Headlamp
    chart: headlamp
    targetRevision: 0.25.0 # Thay bằng phiên bản bạn muốn cài đặt
    helm:
      parameters:
        - name: ingress.enabled
          value: "true"
        - name: ingress.ingressClassName
          value: "nginx" # Thay bằng Ingress Controller bạn đang dùng (nếu có)
        - name: ingress.hosts[0].host
          value: "headlamp.local" # Tên miền bạn muốn gán cho Headlamp
        - name: ingress.hosts[0].paths[0].path
          value: "/"
        - name: ingress.hosts[0].paths[0].pathType
          value: "ImplementationSpecific"
  destination:
    server: 'https://kubernetes.default.svc' # Cài đặt trực tiếp lên cluster hiện tại
    namespace: headlamp-system # Namespace bạn muốn chạy Headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true # Tự động tạo namespace 'headlamp-system' nếu chưa có