headlamp:
  # LƯU Ý 1: Hai dòng này cực kỳ quan trọng để Headlamp không hỏi Token nữa
  extraArgs:
    - "-in-cluster"
  clusterRoleBinding:
    create: true

  # LƯU Ý 2: Đoạn Ingress (giữ nguyên cấu hình cũ của bạn)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/auth-type: basic
      nginx.ingress.kubernetes.io/auth-secret: headlamp-basic-auth
      nginx.ingress.kubernetes.io/auth-realm: "Headlamp Secure v3"
    hosts:
      - host: k8s.dashboard.com
        paths:
          - path: /
            path: ImplementationSpecific
    tls: []