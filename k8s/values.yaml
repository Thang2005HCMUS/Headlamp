headlamp:
  # 1. Cấu hình vào thẳng không đòi token gắt gao từ Kubernetes
  extraArgs:
    - "-in-cluster"
  clusterRoleBinding:
    create: true

  # 2. Cấu hình Ingress và lớp bảo mật bằng Username/Password
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      kubernetes.io/ingress.class: nginx
      # Kích hoạt tính năng Basic Auth của Nginx Ingress
      nginx.ingress.kubernetes.io/auth-type: basic
      nginx.ingress.kubernetes.io/auth-secret: headlamp-basic-auth
      nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - Headlamp"
    hosts:
      - host: k8s.dashboard.com
        paths:
          - path: /
            type: ImplementationSpecific
    tls: []